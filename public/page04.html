<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання №4 - Лічильник символів</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 100px;
            margin: 15px 0;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea:focus {
            border-color: #007bff;
            outline: none;
        }
        .result {
            color: #d9534f;
            font-weight: bold;
        }
        .back {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="card">
    <form> 
        <label><strong>Максимум 25 символів:</strong></label><br> 
        <textarea id="textarea" placeholder="Введіть текст..."></textarea> <br>
        <span id="rchars">25</span> символів залишилося.
    </form>
    <a href="index.html" class="back">← Повернутися на головну</a>
</div>

<script>
    $(document).ready(function() {
        var maxLength = 25;

        $('#textarea').on('input keyup', function() { 
            var val = $(this).val();
            var currentLength = val.length;
            
            var textlen = maxLength - currentLength; 
            $('#rchars').text(textlen); 
            
            if(currentLength >= maxLength) {
                $(this).val(val.substring(0, maxLength));
                $('#rchars').text(0);
            }
        });
    });
</script>

</body>
</html>
