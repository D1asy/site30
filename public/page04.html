<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 4 - Лічильник символів</title>
    <script src="https://jquery.com"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 300px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: none;
            box-sizing: border-box;
            font-size: 14px;
        }
        #rchars {
            font-weight: bold;
            color: #d9534f;
        }
        p {
            margin-top: 10px;
            font-size: 0.9em;
            color: #555;
        }
    </style>
</head>
<body>

<form> 
    <label>Максимум 25 символів:</label>
    <textarea id="textarea"></textarea> 
    <p><span id="rchars">25</span> символів залишилося.</p>
</form>

<script>
    var maxLength = 25;
    $('#textarea').on('keyup', function() { 
        var textlen = maxLength - $(this).val().length; 
        
        $('#rchars').text(textlen); 
        
        if($(this).val().length >= maxLength) {
            $(this).val($(this).val().substring(0, maxLength));
            $('#rchars').text(0); 
        }
    });
</script>

</body>
</html>
