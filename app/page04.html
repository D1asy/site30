<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання №4 - Лічильник символів</title>
    <script src="https://googleapis.com"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            resize: none; 
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #007bff;
        }
        .counter-text {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
        #rchars {
            font-weight: bold;
            color: #d9534f; 
            font-size: 1.1em;
        }
        .back-btn {
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
            color: #007bff;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="container">
    <form> 
        <label>Максимум 25 символів:</label>
        <textarea id="textarea" placeholder="Почніть писати..."></textarea> 
        <div class="counter-text">
            <span id="rchars">25</span> символів залишилося.
        </div>
    </form>
    <a href="index.html" class="back-btn">← Повернутися на головну</a>
</div>

<script>
    $(document).ready(function() {
        var maxLength = 25;

        $('#textarea').on('input keyup', function() { 
            var currentLength = $(this).val().length;
            var textRemaining = maxLength - currentLength; 
            
            $('#rchars').text(textRemaining); 
            
            if(currentLength >= maxLength) {
                $(this).val($(this).val().substring(0, maxLength));
                $('#rchars').text(0);
            }
        });
    });
</script>

</body>
</html>
